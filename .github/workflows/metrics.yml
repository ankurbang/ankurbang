- uses: lowlighter/metrics@latest
  with:
    token: ${{ secrets.METRICS_TOKEN }}
    user: ankurbang
    template: classic
    base: repositories        # ← Fix: was "metadata", needs repos to scan languages
    config_timezone: UTC
    plugin_languages: yes
    plugin_languages_details: percentage
    plugin_languages_limit: 8
    plugin_languages_colors: "c++:#1e3c72, rust:#1e3c72, python:#1e3c72, go:#1e3c72, java:#1e3c72"
    plugin_languages_ignored: html, css, tex
